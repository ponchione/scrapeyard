# Copy this file into a project and replace the example values.

project: example-project
name: example-scrape

target:
  url: "https://example.com/catalog"
  fetcher: dynamic
  # Optional override for adaptive fingerprint sharing.
  # adaptive_domain: example.com
  browser:
    timeout_ms: 90000
    disable_resources: true
    network_idle: false
  item_selector: ".catalog-item"
  selectors:
    title:
      query: ".item-title::text"
      transform: trim
    price:
      query: ".item-price::text"
      transform: trim
    link:
      query: "a::attr(href)"
      transform: prepend("https://example.com")
  # MAP pricing detection (optional). Numeric prices are always classified as
  # explicit; use this block for non-numeric sentinel values and retailer cues
  # that indicate pricing_visibility states.
  # map_detection:
  #   text_patterns:
  #     - "add to cart to see price"
  #     - "call for price"
  #   css_selectors:
  #     - ".map-price-message"
  #   price_value_patterns:
  #     - "<hidden-price>"
  # Stock status detection (optional). Patterns keyed by status value.
  # `stock_signal` is checked first, then DOM text and CSS selectors, so use
  # it when you want the raw availability text to participate in detection.
  # `stock_status` is system-generated from stock_detection; use a selector
  # like `stock_signal` if you want to preserve raw availability text.
  # Legacy raw `stock_status` selector output is copied into `stock_signal`
  # during enrichment only when `stock_signal` is missing or blank. New
  # configs should use `stock_signal` directly.
  # stock_detection:
  #   in_stock:
  #     text_patterns: ["in stock", "available"]
  #   out_of_stock:
  #     text_patterns: ["out of stock", "sold out"]
  pagination:
    next: ".pagination-next"
    max_pages: 5

# Optional override. If omitted, adaptive defaults to false for on-demand jobs
# and true for scheduled jobs.
adaptive: true

retry:
  max_attempts: 3
  backoff: exponential
  backoff_max: 30

validation:
  required_fields: [title, link]
  min_results: 1
  on_empty: retry

execution:
  concurrency: 2
  delay_between: 2
  domain_rate_limit: 3
  mode: auto
  priority: normal

# Uncomment for recurring jobs.
# schedule:
#   cron: "0 * * * *"

output:
  group_by: target

# Uncomment to notify another system when this job finishes.
# webhook:
#   url: "https://example.com/webhooks/scrapeyard"
#   on: [complete, partial, failed]
#   headers:
#     Authorization: "Bearer change-me"
#   timeout: 10
