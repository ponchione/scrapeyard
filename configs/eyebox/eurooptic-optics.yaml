# EuroOptic — Optics Config Skeleton
# Retailer: EuroOptic (eurooptic.com)
# Known URL patterns: /red-dot-sights.aspx, /rifle-scopes.aspx, /holographic-sights.aspx
# Notes: Specialty optics dealer. ASP.NET-based storefront. Strong inventory of premium European brands.

project: eyebox
name: eurooptic-optics

schedule:
  cron: "0 */6 * * *"
  enabled: true

webhook:
  url: http://localhost:9000/ingest
  on: [complete, partial]

execution:
  concurrency: 1
  delay_between: 3
  domain_rate_limit: 2
  mode: async
  priority: normal
  fail_strategy: partial

retry:
  max_attempts: 3
  backoff: exponential
  backoff_max: 30
  retryable_status: [429, 500, 502, 503, 504]

validation:
  required_fields: [name, price, url]
  min_results: 5
  on_empty: warn

output:
  format: json
  group_by: merge

targets:
  - url: https://www.eurooptic.com/red-dot-sights.aspx
    fetcher: stealthy  # dynamic may be needed if JS rendering is required
    selectors:
      name: "TODO: inspect site markup"     # product title
      price: "TODO: inspect site markup"    # current/sale price
      url: "TODO: inspect site markup"      # product detail link
    pagination:
      next: "TODO: inspect site markup"     # next page link/button
      max_pages: 15

  - url: https://www.eurooptic.com/rifle-scopes.aspx
    fetcher: stealthy  # dynamic may be needed if JS rendering is required
    selectors:
      name: "TODO: inspect site markup"
      price: "TODO: inspect site markup"
      url: "TODO: inspect site markup"
    pagination:
      next: "TODO: inspect site markup"
      max_pages: 15

  - url: https://www.eurooptic.com/holographic-sights.aspx
    fetcher: stealthy  # dynamic may be needed if JS rendering is required
    selectors:
      name: "TODO: inspect site markup"
      price: "TODO: inspect site markup"
      url: "TODO: inspect site markup"
    pagination:
      next: "TODO: inspect site markup"
      max_pages: 15
