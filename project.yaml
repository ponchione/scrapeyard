# Generated by conductor init — update project.path before running
project:
  name: "scrapeyard"
  path: "/home/gernsback/source/scrapeyard"  # UPDATE THIS to your actual project path
  language: "python"
  framework: "fastapi"

index:
  include:
    - "**/*.py"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.toml"
    - "**/*.sql"
    - "**/*.md"
    - "**/Dockerfile"
    - "**/docker-compose*.yml"
  exclude:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/.venv/**"
    - "**/dist/**"
    - "**/.mypy_cache/**"
    - "**/.pytest_cache/**"
    - "**/.ruff_cache/**"
    - "**/data/**"
    - "**/*.db"
  max_rag_results: 30
  max_tree_lines: 200
  auto_reindex: true

conventions:
  module_path: "src/scrapeyard"
  module_structure:
    - "src/scrapeyard/api"
    - "src/scrapeyard/config"
    - "src/scrapeyard/engine"
    - "src/scrapeyard/queue"
    - "src/scrapeyard/storage"
    - "src/scrapeyard/scheduler"
    - "src/scrapeyard/models"
    - "src/scrapeyard/formatters"
    - "src/scrapeyard/common"
    - "src/scrapeyard/webhook"
    - "tests"
    - "tests/unit"
    - "tests/integration"
  shared_path: "src/scrapeyard/common"
  sql_path: "sql/"

prompts:
  scope: templates/scope-prompt.md
  verify: templates/verify-prompt.md
  build: templates/build-prompt.md

executor:
  tool: claude-code
  timeout_minutes: 30

safety:
  max_files_changed: 50
  max_duration_mins: 60

guardrails:
  max_investigation_targets: 6
  max_sub_calls_total: 12
  phase_timeout_seconds: 300
  max_cost_per_phase_usd: 0.50
  warn_cost_per_phase_usd: 0.10
