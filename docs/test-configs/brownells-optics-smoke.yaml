# Brownells - Optics Smoke Test Config
# Retailer: Brownells (brownells.com)
# Known URL patterns: /optics/reflex-red-dot-sights/red-dot-sights/ and /optics/scopes/rifle-scopes/
# Notes: Reduced to a single red-dot target for manual ad-hoc validation. Holographic products
# appear under the red-dot category path. Pagination uses ?page=N.

project: eyebox
name: brownells-optics
adaptive: false

webhook:
  url: http://host.docker.internal:19057/ingest
  "on": [complete, partial]

execution:
  concurrency: 1
  delay_between: 3
  domain_rate_limit: 2
  mode: async
  priority: normal
  fail_strategy: partial

retry:
  max_attempts: 3
  backoff: exponential
  backoff_max: 30
  retryable_status: [429, 500, 502, 503, 504]

validation:
  required_fields: [name, price, url]
  min_results: 5
  on_empty: warn

output:
  group_by: merge

target:
  url: https://www.brownells.com/optics/reflex-red-dot-sights/red-dot-sights/
  fetcher: dynamic
  adaptive_domain: brownells.com
  browser:
    timeout_ms: 90000
    disable_resources: true
    network_idle: false
  item_selector: "div.category-slider__item.pl-item"
  selectors:
    name: "a.category-slider__item__title::text"
    price: "div.category-slider__item__price--inline > p.category-slider__item__price::text"
    original_price: "p.category-slider__item__price__old::text"
    url:
      query: "a.category-slider__item__title::attr(href)"
      transform: 'prepend("https://www.brownells.com")'
    stock_status: "div.product-item-inventory span::text"
    image_url: "a.category-slider__item__img img::attr(src)"
  map_detection:
    text_patterns:
      - "add to cart for price"
      - "see price in cart"
      - "price too low to display"
      - "call for price"
    css_selectors:
      - ".map-price-notice"
      - "[data-map-restricted]"
    price_value_patterns:
      - "$0.00"
      - ""
  stock_detection:
    in_stock:
      text_patterns: ["in stock", "add to cart"]
      css_selectors: [".product-item-inventory .in-stock"]
    out_of_stock:
      text_patterns: ["out of stock", "sold out", "unavailable"]
    limited_stock:
      text_patterns: ["only", "few left", "low stock"]
    backorder:
      text_patterns: ["backorder", "backordered"]
    preorder:
      text_patterns: ["preorder", "pre-order"]
  pagination:
    next: "li.plp-pagination-next a"
    max_pages: 3
