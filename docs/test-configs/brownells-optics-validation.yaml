# Brownells optics full validation test
#
# Purpose:
# - Validate the full live path against a heavier retailer scenario
# - Exercise pagination over multiple pages
# - Exercise adaptive matching with an explicit adaptive_domain namespace
# - Verify webhook delivery and persisted results on a larger result set

project: eyebox
name: brownells-optics-validation
adaptive: true

webhook:
  url: http://host.docker.internal:19057/ingest
  on: [complete, partial, failed]

execution:
  concurrency: 1
  delay_between: 3
  domain_rate_limit: 2
  mode: async
  priority: normal
  fail_strategy: partial

retry:
  max_attempts: 3
  backoff: exponential
  backoff_max: 30
  retryable_status: [429, 500, 502, 503, 504]

validation:
  required_fields: [name, price, url]
  min_results: 5
  on_empty: warn

output:
  group_by: merge

target:
  url: https://www.brownells.com/optics/reflex-red-dot-sights/red-dot-sights/
  fetcher: dynamic
  adaptive_domain: brownells.com
  browser:
    timeout_ms: 90000
    disable_resources: true
    network_idle: false
  item_selector: "div.category-slider__item.pl-item"
  selectors:
    name: "a.category-slider__item__title::text"
    price: "div.category-slider__item__price--inline > p.category-slider__item__price::text"
    original_price: "p.category-slider__item__price__old::text"
    url:
      query: "a.category-slider__item__title::attr(href)"
      transform: 'prepend("https://www.brownells.com")'
    stock_status: "div.product-item-inventory span::text"
    image_url: "a.category-slider__item__img img::attr(src)"
  pagination:
    next: "li.plp-pagination-next a"
    max_pages: 3
