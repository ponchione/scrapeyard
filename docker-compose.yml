services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  scrapeyard:
    build: .
    ports:
      - "8420:8420"
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - seccomp:unconfined
    volumes:
      - scrapeyard-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8420/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    environment:
      SCRAPEYARD_API_KEYS: "733924d9ad0e76e470dddb2556845b2e4abee3d81f0084a9ff975411d02c922f"
      # Queue
      SCRAPEYARD_REDIS_DSN: "redis://redis:6379/0"
      SCRAPEYARD_QUEUE_NAME: "scrapeyard"
      SCRAPEYARD_SYNC_TIMEOUT_SECONDS: "15"
      # Workers
      SCRAPEYARD_WORKERS_MAX_CONCURRENT: "4"
      SCRAPEYARD_WORKERS_MAX_BROWSERS: "2"
      SCRAPEYARD_WORKERS_MEMORY_LIMIT_MB: "4096"
      # Scheduler
      SCRAPEYARD_SCHEDULER_JITTER_MAX_SECONDS: "120"
      # Storage
      SCRAPEYARD_STORAGE_RETENTION_DAYS: "30"
      SCRAPEYARD_STORAGE_RESULTS_DIR: "/data/results"
      SCRAPEYARD_STORAGE_MAX_RESULTS_PER_JOB: "100"
      # Data directories
      SCRAPEYARD_DB_DIR: "/data/db"
      SCRAPEYARD_ADAPTIVE_DIR: "/data/adaptive"
      SCRAPEYARD_LOG_DIR: "/data/logs"
      # Circuit breaker
      SCRAPEYARD_CIRCUIT_BREAKER_MAX_FAILURES: "3"
      SCRAPEYARD_CIRCUIT_BREAKER_COOLDOWN_SECONDS: "300"
    restart: unless-stopped

volumes:
  redis-data:
  scrapeyard-data:
